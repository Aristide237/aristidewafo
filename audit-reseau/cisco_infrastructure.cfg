#===============================================================================
# CONFIGURATION DU ROUTEUR DU SIÈGE (R-SIEGE) - PAS DE TELNET & ACCÈS SSHv2
#===============================================================================
hostname R-SIEGE
ip domain-name netsecure.local

# Génération de la clé de chiffrement pour SSH 
crypto key generate rsa general-keys modulus 2048
ip ssh version 2

# Obligation d'utiliser SSH et désactivation de Telnet
line vty 0 4
 transport input ssh
 login local
exit

#===============================================================================
# MODÈLE DE CONFIGURATION POUR LES SWITCHS (SW1, SW2, SW-A, SW-B)
#===============================================================================

hostname SW1-SIEGE
ip domain-name netsecure.local

# Génération de la clé de chiffrement pour SSH 
crypto key generate rsa general-keys modulus 2048
ip ssh version 2

line vty 0 4
 transport input ssh
 login local
exit

#Creation vlan 99 pour ssh et la communication avec le serveru Radius.
vlan 99
 name MANAGEMENT_RESEAU
exit

interface Vlan 99
 ip address 10.0.99.2 255.255.255.0
 # ip a modifier selon le switch
 no shutdown
exit
ip default-gateway 10.0.99.1

#===============================================================================
# CONFIGURATION DU CLIENT RADIUS ET SÉCURITÉ 802.1X
#===============================================================================
aaa new-model

# Déclaration du serveur RADIUS centralisé 
radius server FREE_RADIUS
 address ipv4 10.0.30.30 auth-port 1812 acct-port 1813
 key SecretRadiusEntreprise
exit

aaa authentication dot1x default group radius
dot1x system-auth-control

# force le switch à utiliser le VLAN 99 pour parler au RADIUS
ip radius source-interface Vlan 99

vlan 999
 name VLAN_NATIF_TRASH
exit

#change le vlan 1 par defaut en 999
interface range GigabitEthernet 0/1 - 2
 switchport mode trunk
 switchport trunk native vlan 999
exit

# --- APPLICATION DU 802.1X SUR LES PORTS UTILISATEURS ---
interface range FastEthernet 0/1 - 24
 switchport mode access
 authentication port-control auto
 #par default bloque le port sauf le passage de .1x
 dot1x pae authenticator
 #active l'authentification avec RADIUS
exit