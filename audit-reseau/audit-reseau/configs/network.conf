#!/bin/bash

# --- CONFIGURATION ---
BRIDGE="br-siege"
KALI_IP="10.0.254.254/16"

# Liste des machines : "Nom:IP"
# On se base sur ton fichier netsecure_addressing.csv
DEVICES=(
    "R-SIEGE:10.0.0.1"
    "SW1:10.0.0.2"
    "SRV-DNS:10.0.0.10"
    "SRV-WEB:10.0.0.20"
)

# --- FONCTIONS ---

function create_lab() {
    echo "[+] Création du bridge $BRIDGE..."
    sudo ip link add $BRIDGE type bridge
    sudo ip addr add $KALI_IP dev $BRIDGE
    sudo ip link set $BRIDGE up

    for dev in "${DEVICES[@]}"; do
        NAME="${dev%%:*}"
        IP="${dev#*:}"
        VETH_HOST="veth-$NAME"
        VETH_NS="eth0"

        echo "[+] Création de la machine : $NAME ($IP)..."

        # 1. Créer le namespace
        sudo ip netns add $NAME

        # 2. Créer le lien veth
        sudo ip link add $VETH_HOST type veth peer name $VETH_NS-temp
        
        # 3. Attacher un bout au bridge
        sudo ip link set $VETH_HOST master $BRIDGE
        sudo ip link set $VETH_HOST up

        # 4. Envoyer l'autre bout dans le namespace et le renommer eth0
        sudo ip link set $VETH_NS-temp netns $NAME
        sudo ip netns exec $NAME ip link set $VETH_NS-temp name $VETH_NS
        
        # 5. Configurer l'IP et allumer l'interface
        sudo ip netns exec $NAME ip addr add $IP/16 dev $VETH_NS
        sudo ip netns exec $NAME ip link set $VETH_NS up
        sudo ip netns exec $NAME ip link set lo up

        # --- LANCEMENT DES SERVICES VULNÉRABLES ---
        
        if [[ "$NAME" == "R-SIEGE" || "$NAME" == "SW1" ]]; then
            # Simuler Telnet (Port 23) avec socat
            echo "    -> Lancement Telnet sur $NAME"
            sudo ip netns exec $NAME bash -c "socat TCP-LISTEN:23,reuseaddr,fork EXEC:/bin/sh &"
        
        elif [[ "$NAME" == "SRV-WEB" ]]; then
            # Simuler Serveur Web (Port 80)
            echo "    -> Lancement Serveur HTTP sur $NAME"
            sudo ip netns exec $NAME bash -c "python3 -m http.server 80 &"
            
        elif [[ "$NAME" == "SRV-DNS" ]]; then
            # Simuler DNS (Port 53) - Juste pour que Nmap le voie
            sudo ip netns exec $NAME bash -c "socat UDP-LISTEN:53,reuseaddr,fork STDOUT &"
        fi
    done

    echo "[!] Labo prêt ! Ton IP Kali sur ce réseau est 10.0.254.254"
}

function destroy_lab() {
    echo "[-] Suppression du labo..."
    for dev in "${DEVICES[@]}"; do
        NAME="${dev%%:*}"
        sudo ip netns del $NAME 2>/dev/null
    done
    sudo ip link delete $BRIDGE 2>/dev/null
    sudo pkill -f "socat TCP-LISTEN:23"
    sudo pkill -f "python3 -m http.server 80"
    echo "[!] Tout a été nettoyé."
}

# --- MAIN ---

if [[ "$1" == "start" ]]; then
    create_lab
elif [[ "$1" == "stop" ]]; then
    destroy_lab
else
    echo "Usage: $0 {start|stop}"
fin
